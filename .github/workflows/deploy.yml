name: Deploy to Netlify

on:
  push:
    branches: [ main, master, devin/1721659027-custom-lead-match-netlify-platform ]
  pull_request:
    branches: [ main, master, devin/1721659027-custom-lead-match-netlify-platform ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run UI tests
      run: npm run test
      continue-on-error: true

    - name: Build project
      run: npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

    - name: Install Netlify CLI
      run: npm install -g netlify-cli

    - name: Deploy to Netlify
      run: netlify deploy --prod --dir=dist --message="Deploy from GitHub Actions"
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    - name: Verify function deployment
      run: |
        sleep 30
        curl -f https://customleadmatch.netlify.app/.netlify/functions/industries || exit 1
        curl -f https://customleadmatch.netlify.app/.netlify/functions/sub-services?industry=home_services || exit 1
        echo "✅ Netlify functions deployed successfully"
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    - name: Domain Health Check
      run: |
        echo "=== Checking domain health after deployment ==="
        sleep 30  # Wait for deployment to propagate
        
        # Check custom domain
        if curl -f --max-time 10 https://customleadmatch.com/ > /dev/null 2>&1; then
          echo "✅ Custom domain https://customleadmatch.com/ is healthy"
        else
          echo "❌ Custom domain https://customleadmatch.com/ is failing"
          echo "::warning::Custom domain SSL issue detected - check Netlify dashboard"
        fi
        
        # Check Netlify subdomain (should always work)
        if curl -f --max-time 10 https://customleadmatch.netlify.app/ > /dev/null 2>&1; then
          echo "✅ Netlify subdomain is healthy"
        else
          echo "❌ Netlify subdomain is failing - critical deployment issue"
          exit 1
        fi
